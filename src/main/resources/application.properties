# basic stuff
spring.application.name=RaggaBackend

# FYI I CHANGED THE DB TO RAGGADB
spring.datasource.url=jdbc:mysql://localhost:3306/RaggaDB
spring.datasource.username=cursist
spring.datasource.password=cursist
spring.test.database.replace=none

# hibernate basics
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# makes all the tables, connections etc on boot-up
spring.jpa.hibernate.ddl-auto=create-drop

# sets the naming scheme for Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


### GLOBAL VARIABLES ###
# grid generation
ragga.grid.width=500
ragga.grid.height=500
ragga.grid.zoneAnchorCount=8