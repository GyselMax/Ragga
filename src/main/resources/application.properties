# basic stuff
spring.application.name=RaggaBackend

# FYI I CHANGED THE DB TO RAGGADB
spring.datasource.url=jdbc:mysql://localhost:3306/RaggaDB
spring.datasource.username=cursist
spring.datasource.password=cursist
spring.test.database.replace=none

# hibernate basics
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Evolves the schema on boot-up and KEEPS data across restarts (Phase B:
# generated cities must survive a reboot). `update` only adds tables/columns,
# never drops or alters them, so during active schema churn you may still need
# a manual DROP in dev.
spring.jpa.hibernate.ddl-auto=update

# Bulk-insert tuning: persisting one city writes ~250k GridCell rows (one per
# tile). Batching + ordered inserts turn that into a handful of multi-row
# statements instead of a quarter-million round-trips. See PERSISTENCE.md.
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# sets the naming scheme for Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


### GLOBAL VARIABLES ###
# grid generation
ragga.grid.width=500
ragga.grid.height=500
ragga.grid.zoneAnchorCount=8